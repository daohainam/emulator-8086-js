name: Deploy React to GitHub Pages

# Kích hoạt quá trình deploy mỗi khi có code đẩy lên nhánh 'main'
on:
  push:
    branches: ["main"]

# Cấp quyền ghi cho workflow để nó có thể đưa trang web lên mạng
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Thư mục chứa code đã build của Vite

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4